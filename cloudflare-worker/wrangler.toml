name = "aiscern-image-ensemble"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Vars set via `wrangler secret put <NAME>` — never committed here:
#   HUGGINGFACE_API_TOKEN   — HF Inference API token
#   GEMINI_API_KEY          — Google AI Studio key (primary)
#   GEMINI_API_KEY_2        — Google AI Studio key (secondary fallback, optional)
#   PYTHON_WORKER_URL       — DigitalOcean signal-worker base URL (optional)
#   WORKER_SHARED_SECRET    — must match INTERNAL_API_SECRET checked by Vercel's
#                             /api/detect/image/finalize route, and must be sent
#                             BY Vercel when it calls this worker's /analyze route
#   CALLBACK_BASE_URL       — https://aiscern.com (or preview URL) — where this
#                             worker POSTs the finished result back to

[observability]
enabled = true
