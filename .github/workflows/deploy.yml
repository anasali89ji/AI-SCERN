name: 🚀 Deploy DETECTAI to Netlify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: cd frontend && npm ci

      - name: 🔍 TypeScript check
        run: cd frontend && npx tsc --noEmit

      - name: 🏗️ Build production
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: https://detectai-platform.netlify.app
          NEXT_PUBLIC_APP_NAME: DETECTAI
          HUGGINGFACE_API_TOKEN: ${{ secrets.HUGGINGFACE_API_TOKEN }}

      - name: 🌐 Deploy to Netlify (Preview)
        if: github.event_name == 'pull_request'
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './frontend/.next'
          site-id: ${{ secrets.NETLIFY_SITE_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "PR Preview #${{ github.event.number }}"
          enable-pull-request-comment: true
          enable-commit-comment: false
          overwrites-pull-request-comment: true
          netlify-config-path: ./netlify.toml
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        timeout-minutes: 10

      - name: 🚀 Deploy to Netlify (Production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './frontend/.next'
          site-id: ${{ secrets.NETLIFY_SITE_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy ${{ github.sha }} — ${{ github.event.head_commit.message }}"
          production-deploy: true
          enable-pull-request-comment: false
          enable-commit-comment: true
          netlify-config-path: ./netlify.toml
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        timeout-minutes: 10

      - name: ✅ Deployment complete
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "🎉 DETECTAI is live at https://detectai-platform.netlify.app"
          echo "📦 Commit: ${{ github.sha }}"
          echo "💬 Message: ${{ github.event.head_commit.message }}"
