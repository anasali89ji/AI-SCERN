name: Deploy Cloudflare Pipeline (5 Workers)

on:
  push:
    branches: [main]
    paths:
      - 'cf-pipeline/**'
      - '.github/workflows/deploy-cf-pipeline.yml'
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: 34400e6e147e83e95c942135f54aeba7

jobs:
  deploy:
    name: Deploy CF Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cf-pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cf-pipeline/package-lock.json

      - name: Install deps
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      # ── Main pipeline workers (5 with cron triggers) ────────────────────
      - name: Deploy pipeline workers
        run: |
          FAILED=0
          for cfg in wrangler.toml wrangler-b.toml wrangler-c.toml wrangler-d.toml wrangler-e.toml; do
            echo "▶ Deploying $cfg..."
            if npx wrangler deploy --config "$cfg"; then
              echo "$HF_TOKEN_VAL" | npx wrangler secret put HF_TOKEN --config "$cfg" || true
              echo "  ✅ $cfg deployed"
            else
              echo "  ❌ $cfg FAILED"
              FAILED=$((FAILED+1))
            fi
          done
          [ "$FAILED" -gt 0 ] && echo "$FAILED workers failed" && exit 1 || echo "All 5 pipeline workers deployed"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          HF_TOKEN_VAL:         ${{ secrets.HUGGINGFACE_API_TOKEN }}

      - name: Summary
        run: |
          echo "========================================"
          echo "Pipeline workers (cron every 1 min):"
          echo "  detectai-pipeline   → scraper 1/4"
          echo "  detectai-pipeline-b → scraper 2/4"
          echo "  detectai-pipeline-c → scraper 3/4"
          echo "  detectai-pipeline-d → scraper 4/4"
          echo "  detectai-pipeline-e → HF push every 10 min"
          echo ""
          echo "NOTE: Calibration workers moved to separate CF account"
          echo "      Provide new CF token to deploy: wrangler-cal-*.toml"
          echo ""
          echo "Status: https://detectai-pipeline.saghirahmed9067.workers.dev/status"
          echo "========================================"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
