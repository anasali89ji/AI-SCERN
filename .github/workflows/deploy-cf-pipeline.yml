name: Deploy Cloudflare Pipeline (5 Workers)

on:
  push:
    branches: [main]
    paths:
      - 'cf-pipeline/**'
      - '.github/workflows/deploy-cf-pipeline.yml'
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: 34400e6e147e83e95c942135f54aeba7

jobs:
  deploy:
    name: Deploy 5 CF Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cf-pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cf-pipeline/package-lock.json

      - name: Install deps
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      # Deploy all 5 workers (free plan limit = 5 cron triggers)
      # Worker 1: detectai-pipeline   (scraper, sources 1/4)
      # Worker 2: detectai-pipeline-b (scraper, sources 2/4)
      # Worker 3: detectai-pipeline-c (scraper, sources 3/4)
      # Worker 4: detectai-pipeline-d (scraper, sources 4/4)
      # Worker 5: detectai-pipeline-e (HF push + cleanup, WORKER_NUM=20)
      - name: Deploy all 5 workers
        run: |
          CONFIGS=(
            "wrangler.toml"
            "wrangler-b.toml"
            "wrangler-c.toml"
            "wrangler-d.toml"
            "wrangler-e.toml"
          )
          FAILED=0
          for cfg in "${CONFIGS[@]}"; do
            echo "▶ Deploying $cfg..."
            if npx wrangler deploy --config "$cfg"; then
              echo "$HF_TOKEN_VAL" | npx wrangler secret put HF_TOKEN --config "$cfg"
              echo "  ✅ $cfg deployed"
            else
              echo "  ❌ $cfg FAILED"
              FAILED=$((FAILED+1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "$FAILED workers failed"
            exit 1
          fi
          echo "All 5 workers deployed successfully"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          HF_TOKEN_VAL:         ${{ secrets.HUGGINGFACE_API_TOKEN }}

      - name: Summary
        run: |
          echo "========================================"
          echo "Pipeline running on 5 Cloudflare Workers"
          echo "  Workers 1-4: scraping 59 sources (cron: every 1 min)"
          echo "  Worker 5 (e): HF push every 10 min"
          echo ""
          echo "Status:  https://detectai-pipeline.saghirahmed9067.workers.dev/status"
          echo "Health:  https://detectai-pipeline-e.saghirahmed9067.workers.dev/health"
          echo "Push:    POST https://detectai-pipeline-e.saghirahmed9067.workers.dev/trigger/push"
          echo "========================================"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
