name: Deploy Load Balancer Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'cf-workers/load-balancer.ts'
      - 'cf-workers/wrangler-lb.toml'
      - '.github/workflows/deploy-lb.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Set LB_SECRET
        working-directory: cf-workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 34400e6e147e83e95c942135f54aeba7
        run: echo "${{ secrets.LB_SECRET }}" | wrangler secret put LB_SECRET --config wrangler-lb.toml --name aiscern-lb

      - name: Deploy Load Balancer
        working-directory: cf-workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 34400e6e147e83e95c942135f54aeba7
        run: wrangler deploy --config wrangler-lb.toml
