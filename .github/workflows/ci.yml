name: Aiscern CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Secret detection ────────────────────────────────────────────
  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ── Stage 2: Dependency audit ────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: npm audit (high + critical)
        run: cd frontend && npm audit --audit-level=high
        continue-on-error: true

  # ── Stage 3: Security header lint ───────────────────────────────────────
  headers-check:
    name: Security Headers Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check X-Frame-Options
        run: grep -q "X-Frame-Options" frontend/next.config.ts || grep -q "X-Frame-Options" frontend/next.config.js || (echo "❌ X-Frame-Options missing" && exit 1)

      - name: Check CSP
        run: grep -q "Content-Security-Policy" frontend/next.config.ts || grep -q "Content-Security-Policy" frontend/next.config.js || (echo "❌ CSP missing" && exit 1)

      - name: Check HSTS
        run: grep -q "Strict-Transport-Security" frontend/next.config.ts || grep -q "Strict-Transport-Security" frontend/next.config.js || (echo "❌ HSTS missing" && exit 1)

      - name: Ensure service role key is never NEXT_PUBLIC_
        run: |
          if grep -rn "NEXT_PUBLIC_SUPABASE_SERVICE_ROLE" frontend/ --include="*.ts" --include="*.tsx" --include="*.js" 2>/dev/null | grep -v ".env.example"; then
            echo "❌ SERVICE_ROLE_KEY must NEVER be NEXT_PUBLIC_!" && exit 1
          fi
          echo "✅ Service role key check passed"

  # ── Stage 4: TypeScript + Build ──────────────────────────────────────────
  build:
    name: TypeScript + Build
    runs-on: ubuntu-latest
    needs: [secrets-scan, headers-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: TypeScript strict check
        run: cd frontend && npx tsc --noEmit

      - name: Production build
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: https://aiscern.com
          NEXT_PUBLIC_APP_NAME: Aiscern
          SUPABASE_SERVICE_ROLE_KEY: stub
          CLERK_SECRET_KEY: stub
          GEMINI_API_KEY: stub
          INTERNAL_API_SECRET: stub-ci
          R2_ACCOUNT_ID: stub
          R2_ACCESS_KEY_ID: stub
          R2_SECRET_ACCESS_KEY: stub
          R2_BUCKET_NAME: stub

      - name: ✅ CI passed
        run: echo "All checks passed — Vercel auto-deploy triggered on push to main"
