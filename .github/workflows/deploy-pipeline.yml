name: DETECTAI Pipeline Deploy

on:
  push:
    branches: [main]
    paths: ['cf-pipeline/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cf-pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: cf-pipeline/package-lock.json }
      - run: npm ci
      - run: npx tsc --noEmit

      - name: Deploy all 5 workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          for cfg in wrangler.toml wrangler-b.toml wrangler-c.toml wrangler-d.toml wrangler-e.toml; do
            echo "==> Deploying $cfg"
            npx wrangler deploy --config "$cfg"
            echo "$HF_TOKEN" | npx wrangler secret put HF_TOKEN --config "$cfg"
            echo "    ✅ Done"
          done
