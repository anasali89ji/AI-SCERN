name: 🚀 Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy frontend → Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Deploy
        working-directory: ./frontend
        env:
          # VERCEL_TOKEN must be set in GitHub repo secrets.
          # Token owner must have access to team: team_sUVHUcrNUc6fWYVOF1cpD1Z1
          # Create at: https://vercel.com/account/tokens
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEXT_TELEMETRY_DISABLED: '1'
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "❌ VERCEL_TOKEN secret is not set."
            echo ""
            echo "Fix: Go to https://vercel.com/account/tokens → Create token"
            echo "     Then: GitHub repo → Settings → Secrets → Actions → VERCEL_TOKEN"
            exit 1
          fi
          vercel deploy --prod --yes --token="$VERCEL_TOKEN" 2>&1 | tee /tmp/deploy.log
          URL=$(grep -Eo 'https://[a-zA-Z0-9._-]+\.vercel\.app' /tmp/deploy.log | tail -1)
          echo "✅ Deployed → ${URL:-aiscern.com}"

      - name: Summary
        if: always()
        run: |
          echo "## 🚀 Deployment: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Branch: \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/deploy.log 2>/dev/null | tail -10 >> "$GITHUB_STEP_SUMMARY" || true
