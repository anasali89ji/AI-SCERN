name: Deploy to Vercel Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: team_sUVHUcrNUc6fWYVOF1cpD1Z1
          vercel-project-id: prj_R0OLbFaz8BVYMuToCXF4hGJTBoWi
          working-directory: ./frontend
          vercel-args: '--prod'
          scope: team_sUVHUcrNUc6fWYVOF1cpD1Z1
