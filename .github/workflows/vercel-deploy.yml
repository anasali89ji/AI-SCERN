name: Deploy to Vercel

on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feat/**'
      - 'hotfix/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'preview'
        type: choice
        options: [production, preview]

# Prevent duplicate deployments for the same branch/commit.
# Cancel in-progress runs when a newer push arrives on the same branch.
concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: ${{ github.ref == 'refs/heads/main' && 'Production Deploy' || 'Preview Deploy' }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Pull remote project config (env vars, build settings) into local .vercel/
      # This ensures rootDirectory, buildCommand etc. come from the Vercel project,
      # not the local vercel.json at repo root.
      - name: Pull Vercel project config
        run: vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }} --cwd frontend
        env:
          VERCEL_ORG_ID: team_sUVHUcrNUc6fWYVOF1cpD1Z1
          VERCEL_PROJECT_ID: prj_xoNvRPv0ooeRx7DA8k1BAODHcDj9

      # Build locally so CI catches errors before uploading to Vercel.
      # Uses the env vars pulled in the previous step.
      - name: Build project
        run: vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }} --cwd frontend
        env:
          VERCEL_ORG_ID: team_sUVHUcrNUc6fWYVOF1cpD1Z1
          VERCEL_PROJECT_ID: prj_xoNvRPv0ooeRx7DA8k1BAODHcDj9

      # Deploy the pre-built output — no rebuild on Vercel's side.
      # --prebuilt skips Vercel's remote build step entirely; avoids webhook/GA conflicts.
      - name: Deploy prebuilt output
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --yes --token=${{ secrets.VERCEL_TOKEN }} --cwd frontend)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $URL"
        env:
          VERCEL_ORG_ID: team_sUVHUcrNUc6fWYVOF1cpD1Z1
          VERCEL_PROJECT_ID: prj_xoNvRPv0ooeRx7DA8k1BAODHcDj9

      - name: Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Type** | ${{ github.ref == 'refs/heads/main' && '🟢 Production' || '🔵 Preview' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
