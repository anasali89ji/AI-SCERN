name: 🚀 Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy frontend → Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Guard: fail loudly if the required secret is missing ──────────────
      - name: Verify VERCEL_TOKEN secret is set
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "❌  VERCEL_TOKEN secret is not set."
            echo ""
            echo "Fix:"
            echo "  1. Go to GitHub → Settings → Secrets → Actions"
            echo "  2. Add VERCEL_TOKEN with your Vercel personal access token"
            echo "  3. Get a token at https://vercel.com/account/tokens"
            exit 1
          fi
          echo "✅ VERCEL_TOKEN is present (${#VERCEL_TOKEN} chars)"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # ── Link project (creates .vercel/project.json) ───────────────────────
      - name: Link Vercel project
        working-directory: ./frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          # Use secrets if set, otherwise fall back to the known hardcoded IDs.
          # To override: add VERCEL_ORG_ID / VERCEL_PROJECT_ID to GitHub Secrets.
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || 'team_sUVHUcrNUc6fWYVOF1cpD1Z1' }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID || 'prj_xoNvRPv0ooeRx7DA8k1BAODHcDj9' }}
        run: |
          vercel link --yes --token="$VERCEL_TOKEN"
          echo "✅ Project linked"

      # ── Production deploy ─────────────────────────────────────────────────
      - name: Deploy to Vercel (production)
        id: deploy
        working-directory: ./frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || 'team_sUVHUcrNUc6fWYVOF1cpD1Z1' }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID || 'prj_xoNvRPv0ooeRx7DA8k1BAODHcDj9' }}
          NEXT_TELEMETRY_DISABLED: '1'
        run: |
          DEPLOY_URL=$(vercel deploy --prod \
            --yes \
            --token="$VERCEL_TOKEN" \
            2>&1 | tee /tmp/vercel-output.txt | grep -E "^https://" | tail -1)

          if [ -z "$DEPLOY_URL" ]; then
            echo "❌ Deploy failed — Vercel CLI output:"
            cat /tmp/vercel-output.txt
            exit 1
          fi

          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "✅ Deployed → $DEPLOY_URL"

      - name: Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Result" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **URL** | ${{ steps.deploy.outputs.deploy_url || 'N/A — check logs' }} |" >> "$GITHUB_STEP_SUMMARY"
