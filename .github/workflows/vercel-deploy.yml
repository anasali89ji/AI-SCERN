name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # PRIMARY: Deploy hook — no token needed, just a URL
      # To set up: Vercel Dashboard → detect-ai → Settings → Git → Deploy Hooks
      # Create hook: name="github-actions" branch="main" → copy the URL
      # Add to GitHub: repo → Settings → Secrets → VERCEL_DEPLOY_HOOK
      - name: Trigger via deploy hook
        if: ${{ secrets.VERCEL_DEPLOY_HOOK != '' }}
        run: |
          RESULT=$(curl -sf -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          echo "Deploy triggered: $RESULT"

      # FALLBACK: CLI with token if hook not set
      - name: Deploy via CLI (fallback)
        if: ${{ secrets.VERCEL_DEPLOY_HOOK == '' }}
        run: vercel deploy --prod --yes --cwd frontend --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_sUVHUcrNUc6fWYVOF1cpD1Z1
          VERCEL_PROJECT_ID: prj_xoNvRPv0ooeRx7DA8k1BAODHcDj9
