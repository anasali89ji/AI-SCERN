# Vercel deployment is handled by Vercel's native GitHub integration (webhook).
# This workflow is a MANUAL fallback via workflow_dispatch.
#
# Required secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN      — vercel.com → Settings → Tokens → Create Token (scope: team)
#   VERCEL_ORG_ID     — team_sUVHUcrNUc6fWYVOF1cpD1Z1
#   VERCEL_PROJECT_ID — from Vercel project settings
#
# For auto-deploy to work:
#   1. Vercel project must be ACTIVE (not paused) — dashboard → Settings → Resume
#   2. aiscern.com domain must be added — dashboard → Settings → Domains
#   3. GitHub integration must be connected — dashboard → Settings → Git

name: Vercel Manual Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'production'
        type: choice
        options: [production, preview]

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        shell: bash
        working-directory: .
        run: npm i -g vercel@latest

      # Install deps FIRST — prevents vercel pull from spawning its own npm install
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      # Pull Vercel environment variables and project settings
      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=${{ inputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Build locally (uses pre-installed node_modules — no re-install)
      - name: Build Project
        run: vercel build ${{ inputs.environment == 'production' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Upload prebuilt output to Vercel
      - name: Deploy to Vercel
        run: vercel deploy --prebuilt ${{ inputs.environment == 'production' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
