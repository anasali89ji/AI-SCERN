# Manual deployment fallback — workflow_dispatch only.
#
# Auto-deploy on push is handled entirely by Vercel's native GitHub integration
# (the webhook Vercel installs when you connect the repo in the dashboard).
# Running BOTH this workflow AND the native webhook on every push causes the
# concurrency group to cancel one of them — don't add push triggers here.
#
# Use this workflow only when:
#   - The native webhook missed a deployment
#   - You need to force a re-deploy without a new commit
#   - You need to deploy a specific branch to preview
#
# Required secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN      — vercel.com → Account Settings → Tokens (team-scoped)
#   VERCEL_ORG_ID     — team_sUVHUcrNUc6fWYVOF1cpD1Z1
#   VERCEL_PROJECT_ID — Vercel Dashboard → detect-ai → Settings → General

name: Vercel Manual Deploy (fallback)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: false
        default: 'production'
        type: choice
        options: [production, preview]

concurrency:
  group: vercel-manual-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Manual Deploy → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        working-directory: .
        run: npm install -g vercel@latest

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Pull Vercel project config
        run: vercel pull --yes --environment=${{ inputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy ${{ inputs.environment == 'production' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Summary
        if: always()
        working-directory: .
        run: |
          echo "## 🚀 Manual Vercel Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u +'%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
