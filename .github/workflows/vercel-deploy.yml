# ─────────────────────────────────────────────────────────────────────────────
# Vercel Deploy
#
# WHY this workflow doesn't use `vercel build`:
#   `vercel build` internally calls spawn('sh', ['-c', installCommand]) to
#   re-run npm ci — even if node_modules already exists. On GitHub's ubuntu-24
#   runners the Vercel CLI subprocess cannot resolve `sh` in its PATH, causing:
#     Error: spawn sh ENOENT
#   The fix: validate the build ourselves with `npm run build` (pure Node, no
#   spawn issues), then deploy the source with `vercel deploy --prod`.
#   Vercel's remote build servers have a proper shell and handle npm install
#   themselves using the installCommand in vercel.json.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN      — vercel.com → Settings → Tokens (Team-scoped)
#   VERCEL_ORG_ID     — team_sUVHUcrNUc6fWYVOF1cpD1Z1
#   VERCEL_PROJECT_ID — Vercel Dashboard → Project → Settings → General
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to Vercel

on:
  push:
    branches: [main, 'fix/**', 'feat/**', 'hotfix/**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: false
        default: 'production'
        type: choice
        options: [production, preview]

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy (${{ github.ref == 'refs/heads/main' && 'Production' || 'Preview' }})
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        working-directory: .
        run: npm install -g vercel@latest

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Validate the build locally — catches TypeScript/ESLint errors in CI logs
      # Uses pure Node (no shell spawn), so no ENOENT issues
      - name: Validate build (npm run build)
        run: npm run build
        env:
          # Dummy values so Next.js doesn't fail on missing env during CI build
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_TELEMETRY_DISABLED: '1'

      # Pull Vercel project.json — needed for `vercel deploy` to know the project
      - name: Pull Vercel project config
        run: vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Source deploy — Vercel's remote servers install deps & build with proper shell
      # This avoids the spawn sh ENOENT that `vercel build --prebuilt` causes locally
      - name: Deploy to Vercel
        id: deploy
        run: |
          PROD_FLAG=${{ github.ref == 'refs/heads/main' && '"--prod"' || '""' }}
          DEPLOY_URL=$(vercel deploy $PROD_FLAG --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deployment summary
        if: always()
        working-directory: .
        run: |
          echo "## 🚀 Vercel Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ github.ref == 'refs/heads/main' && '🟢 Production' || '🔵 Preview' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u +'%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
