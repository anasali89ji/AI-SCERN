name: Deploy to Vercel Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Check token
        run: vercel whoami --token=${{ secrets.VERCEL_TOKEN }} --scope=anas-projects-0a7d1391 || echo "whoami failed - check token scope"

      - name: Deploy
        working-directory: ./frontend
        run: |
          vercel deploy \
            --prod \
            --yes \
            --scope=anas-projects-0a7d1391 \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --debug 2>&1 | tail -50
