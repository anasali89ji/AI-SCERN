name: 🚀 Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy frontend → Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify VERCEL_TOKEN secret is set
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "❌ VERCEL_TOKEN secret is not set."
            echo "Fix: GitHub → Settings → Secrets → Actions → Add VERCEL_TOKEN"
            echo "Get token at: https://vercel.com/account/tokens"
            exit 1
          fi
          echo "✅ VERCEL_TOKEN present (${#VERCEL_TOKEN} chars)"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Create project.json so CLI knows which project to deploy to (no interactive link needed)
      - name: Configure Vercel project
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || 'team_sUVHUcrNUc6fWYVOF1cpD1Z1' }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID || 'prj_xoNvRPv0ooeRx7DA8k1BAODHcDj9' }}
        run: |
          mkdir -p frontend/.vercel
          echo "{\"projectId\":\"$VERCEL_PROJECT_ID\",\"orgId\":\"$VERCEL_ORG_ID\"}" > frontend/.vercel/project.json
          echo "✅ Vercel project config written"

      - name: Deploy to Vercel (production)
        id: deploy
        working-directory: ./frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEXT_TELEMETRY_DISABLED: '1'
        run: |
          vercel deploy --prod --yes --token="$VERCEL_TOKEN" 2>&1 | tee /tmp/vercel-output.txt

          DEPLOY_URL=$(grep -E "^https://" /tmp/vercel-output.txt | tail -1)

          if [ -z "$DEPLOY_URL" ]; then
            echo "❌ Deploy failed — Vercel output:"
            cat /tmp/vercel-output.txt
            exit 1
          fi

          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "✅ Deployed → $DEPLOY_URL"

      - name: Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Result" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **URL** | ${{ steps.deploy.outputs.deploy_url || 'N/A — check logs' }} |" >> "$GITHUB_STEP_SUMMARY"
