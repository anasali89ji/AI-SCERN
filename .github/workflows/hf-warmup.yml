name: HuggingFace Model Warmup

on:
  schedule:
    # Every 15 minutes — keeps HF models warm, prevents cold starts
    - cron: '*/15 * * * *'
  workflow_dispatch: # Manual trigger for testing

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Aiscern Health
        run: |
          curl -s --max-time 10 https://aiscern.com/api/health || true

      - name: Warm HF Text Model (RoBERTa)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          curl -s --max-time 15 \
            -X POST \
            -H "Authorization: Bearer $HF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"inputs":"Automated warmup ping for Aiscern AI detection platform."}' \
            "https://api-inference.huggingface.co/models/openai-community/roberta-base-openai-detector" || true

      - name: Warm HF ChatGPT Detector
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          curl -s --max-time 15 \
            -X POST \
            -H "Authorization: Bearer $HF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"inputs":"Warmup request for Aiscern detection ensemble."}' \
            "https://api-inference.huggingface.co/models/Hello-SimpleAI/chatgpt-detector-roberta" || true

      - name: Warm Aiscern Text Endpoint
        run: |
          curl -s --max-time 20 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Internal-Secret: ${{ secrets.INTERNAL_API_SECRET }}" \
            -d '{"text":"This is an automated warmup request from GitHub Actions to prevent Vercel cold starts on the Aiscern AI detection platform. Regular warmup pings ensure fast response times for all users."}' \
            "https://aiscern.com/api/detect/text" || true
