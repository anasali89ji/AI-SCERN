name: Security & Quality Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly security scan every Monday 6AM UTC
    - cron: "0 6 * * 1"

jobs:
  security-audit:
    name: Security & Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build verification
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:000000000000:web:placeholder
          NVIDIA_API_KEY: placeholder
          HUGGINGFACE_API_TOKEN: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          CLOUDFLARE_API_TOKEN: placeholder
          CLOUDFLARE_ACCOUNT_ID: placeholder
          CLOUDFLARE_D1_DATABASE_ID: placeholder

  admin-audit:
    name: Admin Panel Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true
