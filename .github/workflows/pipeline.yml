name: Pipeline Manual Trigger

on:
  workflow_dispatch:

# Manual trigger to force-push all pending D1 rows to HuggingFace.
# Normal operation: CF Workers cron handles this every minute automatically.
# Use this only if W20 (detectai-pipeline-e) appears stuck.

jobs:
  trigger-push:
    name: Force HF Push via W20
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger W20 push endpoint
        run: |
          echo "=== Triggering W20 (detectai-pipeline-e) HF push ==="
          HTTP_CODE=$(curl -s -o /tmp/w20_resp.json -w "%{http_code}" \
            -X POST \
            "https://detectai-pipeline-e.workers.dev/trigger/push" \
            --max-time 60) || HTTP_CODE="000"

          echo "HTTP status: $HTTP_CODE"
          cat /tmp/w20_resp.json 2>/dev/null || true

          if [ "$HTTP_CODE" = "000" ]; then
            echo "⚠️  W20 unreachable (network timeout). Worker may be offline."
            echo "worker_status=offline" >> "$GITHUB_OUTPUT"
          elif [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ W20 push triggered successfully."
            echo "worker_status=ok" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️  W20 returned HTTP $HTTP_CODE — push may have failed."
            echo "worker_status=error" >> "$GITHUB_OUTPUT"
          fi
        id: w20

      - name: Check pipeline status
        run: |
          echo "=== Pipeline status ==="
          curl -sf --max-time 15 "https://detectai-pipeline.workers.dev/status" \
            | python3 -c "
import json,sys
d=json.load(sys.stdin)
ds=d.get('dataset',{}); ps=d.get('state',{})
print(f'  Pending: {ds.get(\"pending\",0):,}')
print(f'  Pushed:  {ps.get(\"total_pushed\",0):,}')
print(f'  Scraped: {ps.get(\"total_scraped\",0):,}')
" 2>/dev/null || echo "  Could not fetch pipeline stats (worker may be starting up)"

      - name: Summary
        run: |
          echo "Worker status: ${{ steps.w20.outputs.worker_status }}"
          echo "If worker shows offline: check https://dash.cloudflare.com → Workers → detectai-pipeline-e"
