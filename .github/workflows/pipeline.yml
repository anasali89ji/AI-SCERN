name: ⚙️ Pipeline Worker

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:          # Manual trigger anytime

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scrape
        run: |
          curl -s -X POST \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/functions/v1/pipeline-worker" \
            -H "Content-Type: application/json" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -d '{"job_type": "scrape"}' | jq .

      - name: Trigger clean
        run: |
          curl -s -X POST \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/functions/v1/pipeline-worker" \
            -H "Content-Type: application/json" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -d '{"job_type": "clean"}' | jq .

      - name: Summary
        run: echo "✅ Pipeline cycle complete"
